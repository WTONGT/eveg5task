<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五级任务报酬统计</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{
  /* 配色 */
  --bg:#f8f6f2;
  --card:#fff;
  --border:#e8e5e0;
  --text:#1e1e1e;
  --text2:#6f6b65;
  --text3:#a8a39b;
  --blue:#5b5ea6;
  --blue-10:#f4f3fa;
  --gold:#d4913e;
  --red:#d4645c;
  --on-color:#fff;
  --toast-bg:rgba(30,30,30,.88);
  /* 间距（4px 基准刻度） */
  --space-1:4px;
  --space-2:8px;
  --space-3:12px;
  --space-4:16px;
  --space-5:20px;
  --space-6:24px;
  --space-8:32px;
  /* 字体大小 */
  --fs-xs:12px;
  --fs-sm:13px;
  --fs-base:14px;
  --fs-md:15px;
  --fs-lg:16px;
  --fs-xl:22px;
  /* 字重 */
  --weight-md:500;
  --weight-semi:600;
  --weight-bold:700;
  /* 圆角 */
  --radius:14px;
  --radius-sm:9px;
  --radius-pill:20px;
  /* 阴影 */
  --shadow-sm:0 1px 2px rgba(0,0,0,.03);
  --shadow:0 1px 3px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.04);
  --shadow-blue:0 2px 8px rgba(91,94,166,.25);
  --shadow-gold:0 2px 12px rgba(212,145,62,.25);
  --ring-blue:0 0 0 3px rgba(91,94,166,.1);
  /* 过渡 */
  --ease:.15s ease;
  --ease-slow:.2s ease;
  /* 字体栈 */
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  position:relative;
  background:var(--bg);
  max-width:640px;
  margin:0 auto;
  padding:var(--space-8) var(--space-5) 60px;
  font-family:var(--font);
  font-size:var(--fs-base);
  line-height:1.65;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

/* 头部 */
.header{
  text-align:center;
  margin-bottom:var(--space-6);
}
.header h1{
  font-size:var(--fs-xl);
  font-weight:var(--weight-bold);
  letter-spacing:-.3px;
  color:var(--text);
}

/* 价目表 */
.price-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  margin-bottom:var(--space-4);
  overflow:hidden;
}
.price-grid{
  padding:var(--space-3);
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:var(--space-1);
}
.price-item{
  padding:var(--space-2) var(--space-3);
  background:var(--bg);
  border-radius:var(--radius-sm);
  font-size:var(--fs-sm);
  font-weight:var(--weight-semi);
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:var(--text2);
  cursor:pointer;
  transition:background var(--ease),color var(--ease);
}
.price-item span{font-weight:var(--weight-semi);color:var(--text);transition:color var(--ease)}
/* 价格数字：与结算页一致的金色 */
.price-item .p{color:var(--gold)}
.price-item:hover,
.price-item.zero:hover{
  background:var(--blue-10);
  color:var(--blue);
}
.price-item:hover span,
.price-item.zero:hover span{color:var(--blue)}
.price-item.zero,
.price-item.zero span{color:var(--red)}

/* 输入框 */
textarea{
  width:100%;
  height:120px;
  padding:var(--space-3) var(--space-4);
  border:1px solid var(--border);
  border-radius:var(--radius);
  font-family:var(--font);
  font-size:var(--fs-sm);
  line-height:1.6;
  resize:none;
  margin-bottom:var(--space-3);
  outline:none;
  background:var(--card);
  color:var(--text);
  transition:border-color var(--ease-slow),box-shadow var(--ease-slow);
}
textarea:focus{
  border-color:var(--blue);
  box-shadow:var(--ring-blue);
}
textarea::placeholder{color:var(--text3)}

/* 右上角齿轮设置 + 说明按钮 */
.gear-btn,.help-btn{
  position:absolute;
  top:16px;
  width:30px;
  height:30px;
  border-radius:50%;
  background:transparent;
  border:none;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:9999;
  font-size:16px;
  line-height:1;
  color:var(--text3);
  user-select:none;
  transition:color var(--ease);
}
.gear-btn svg,.help-btn svg{
  display:block;
  width:18px;
  height:18px;
}
.gear-btn{ right:var(--space-5); }
.help-btn{ right:calc(var(--space-5) + 34px); }
.gear-btn:hover,.help-btn:hover{
  color:var(--blue);
}
.gear-pop,.help-pop{
  position:absolute;
  top:62px;
  right:var(--space-5);
  width:240px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:var(--space-3) var(--space-4);
  z-index:9999;
  display:none;
}
.gear-pop.show,.help-pop.show{ display:block; }
.help-pop{ width:260px; }
.help-pop .help-list{
  font-size:var(--fs-sm);
  color:var(--text2);
  line-height:1.7;
  padding-left:var(--space-4);
  margin:0;
}
.help-pop .help-list li{ margin-bottom:var(--space-1); }
.gear-pop .pop-title,
.help-pop .pop-title{
  font-size:var(--fs-sm);
  font-weight:var(--weight-semi);
  color:var(--text);
  margin-bottom:var(--space-2);
}
.myid-input{
  width:100%;
  height:40px;
  padding:0 var(--space-3);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-family:var(--font);
  font-size:var(--fs-sm);
  background:var(--card);
  color:var(--text);
  outline:none;
  transition:border-color var(--ease-slow),box-shadow var(--ease-slow);
}
.myid-input:focus{
  border-color:var(--blue);
  box-shadow:var(--ring-blue);
}
.gear-pop .pop-tip{
  font-size:var(--fs-xs);
  color:var(--text3);
  margin-top:var(--space-2);
  line-height:1.5;
}

/* 按钮 */
.btns{
  display:flex;
  gap:var(--space-2);
  justify-content:center;
  margin-bottom:var(--space-6);
}
button{
  padding:var(--space-3) var(--space-6);
  border-radius:var(--radius-sm);
  border:none;
  font-family:var(--font);
  font-size:var(--fs-base);
  font-weight:var(--weight-md);
  cursor:pointer;
  transition:all var(--ease);
}
.btn-primary{
  background:var(--blue);
  color:var(--on-color);
}
.btn-primary:hover{
  transform:translateY(-1px);
  box-shadow:var(--shadow-blue);
}
.btn-secondary{
  background:var(--bg);
  color:var(--text2);
  border:1px solid var(--border);
}
.btn-secondary:hover{
  background:var(--blue-10);
  color:var(--blue);
  border-color:var(--blue);
}

/* 结果区域 */
.result-title{
  text-align:center;
  margin-bottom:var(--space-4);
  font-size:var(--fs-lg);
  font-weight:var(--weight-semi);
  color:var(--text2);
}

.user-box{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  padding:var(--space-4);
  margin-bottom:var(--space-2);
  cursor:pointer;
  -webkit-user-select:none;
  user-select:none;
  transition:box-shadow var(--ease-slow),transform var(--ease-slow);
}
.user-box:hover{
  box-shadow:var(--shadow);
  transform:translateY(-1px);
}

.user-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:var(--space-3);
}
.user-head .user-info{
  display:flex;
  align-items:center;
}
.user-head .user-name{
  font-size:var(--fs-lg);
  font-weight:var(--weight-bold);
  color:var(--text);
  margin-right:var(--space-2);
}
.user-head .user-id{
  font-size:var(--fs-lg);
  font-weight:var(--weight-bold);
  color:var(--blue);
}

/* 任务列表 */
.task-list{
  border-top:1px solid var(--border);
}
.task-row{
  font-size:var(--fs-sm);
  padding:var(--space-2) 0;
  border-bottom:1px solid var(--bg);
  display:flex;
  align-items:center;
}
.task-row:last-child{border-bottom:none}
.task-row .name{flex:2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:var(--weight-md);color:var(--text);margin-right:var(--space-2)}
.task-row .info{flex:4;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:var(--space-2)}
.task-row .price{flex:0 0 56px;text-align:right;font-weight:var(--weight-semi);color:var(--gold)}
/* 0M 任务（如斩龙行动）：名称与价格显示红色，与价目表一致 */
.task-row.zero .name,
.task-row.zero .price{color:var(--red)}

/* 报酬 */
.user-total{
  margin-top:var(--space-3);
  padding-top:var(--space-3);
  border-top:1px solid var(--border);
  font-weight:var(--weight-semi);
  color:var(--gold);
  text-align:right;
  font-size:var(--fs-md);
}

/* 总计 */
.total-all{
  margin-top:var(--space-4);
  padding:var(--space-4);
  background:var(--gold);
  color:var(--on-color);
  text-align:center;
  border-radius:var(--radius);
  font-size:var(--fs-lg);
  font-weight:var(--weight-semi);
  box-shadow:var(--shadow-gold);
  cursor:pointer;
  user-select:none;
  transition:filter var(--ease),transform var(--ease);
}
.total-all:hover{filter:brightness(1.05)}
.total-all:active{transform:translateY(1px)}

/* Toast */
.toast{
  position:fixed;
  bottom:var(--space-6);
  left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--toast-bg);
  color:var(--on-color);
  padding:var(--space-2) var(--space-5);
  border-radius:var(--radius-pill);
  font-size:var(--fs-sm);
  z-index:10000;
  transition:transform var(--ease-slow),opacity var(--ease-slow);
  opacity:0;
  pointer-events:none;
}
.toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}

/* 未识别行提醒 */
.unrec-card{
  background:#fdeceb;
  border:1px solid var(--red);
  border-radius:var(--radius);
  padding:var(--space-3) var(--space-4);
  margin-bottom:var(--space-4);
  font-size:var(--fs-sm);
}
.unrec-title{
  color:var(--red);
  font-weight:var(--weight-semi);
  margin-bottom:var(--space-2);
}
.unrec-list{
  color:var(--text2);
  word-break:break-all;
  line-height:1.9;
}
.unrec-tip{
  margin-top:var(--space-2);
  color:var(--text3);
  font-size:var(--fs-xs);
}
</style>
</head>

<body>
<div class="header">
  <h1>五级任务报酬统计</h1>
</div>

<!-- 右上角说明按钮：点击展开功能说明 -->
<div class="help-btn" id="helpBtn" onclick="toggleHelp()" title="功能说明" aria-label="功能说明">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
</div>
<div class="help-pop" id="helpPop">
  <div class="pop-title">功能说明</div>
  <ul class="help-list">
    <li>点上方价目表任务，可一键复制任务名</li>
    <li>在齿轮里填「我的编号」，复制时会自动带上（如 123繁殖设施）</li>
    <li>粘贴任务地点数据后点「开始统计」，自动汇总各老板报酬</li>
    <li>点结算卡片或「总收入」可截图，直接粘贴到QQ分享</li>
  </ul>
</div>

<!-- 右上角齿轮：点击展开「我的编号」设置 -->
<div class="gear-btn" id="gearBtn" onclick="toggleGear()" title="设置" aria-label="设置">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
</div>
<div class="gear-pop" id="gearPop">
  <div class="pop-title">我的编号</div>
  <input id="myId" class="myid-input" placeholder="如 123（留空则只复制任务名）" />
  <div class="pop-tip">点任务复制时会自动带上此编号，已用本地记忆保存</div>
</div>

<div class="price-card">
  <div class="price-grid" id="priceGrid"></div>
</div>

<textarea id="input" placeholder="在地点里选中所有完成的任务地点Ctrl+C，然后在这里Ctrl+V...可模糊识别数字+任务名称关键字"></textarea>
<div class="btns">
  <button class="btn-primary" onclick="calc()">开始统计</button>
  <button class="btn-secondary" onclick="clearAll()">清空</button>
</div>

<div id="result"></div>

<div class="toast" id="toast"></div>

<script>
/* ====================== 任务识别配置 ====================== */
// 任务名 → 报酬(M)
const TASK_PRICE = {
  "繁殖设施":15,"天使的愤怒":20,"净化的火焰":20,"开拓号":20,
  "清理门户":20,"地平线上的萨沙":20,"灭龙行动":20,"萨沙取物":20,
  "自由间谍":25,"重重一螫":25,"聚集力量":25,"巨型驱动器":25,
  "解放矿工A":25,"解放矿工C":25,"袭击护航队A":35,"袭击护航队C":40,
  "地点地点":25,"斩龙行动":0
};
// 关键字 → 任务名（模糊匹配；匹配区分大小写，故大小写别名需分别列出）
const KEY_MAP = {
  "繁殖":"繁殖设施","设施":"繁殖设施","天使":"天使的愤怒","愤怒":"天使的愤怒",
  "净化":"净化的火焰","火焰":"净化的火焰","开拓":"开拓号","清理":"清理门户",
  "门户":"清理门户","地平":"地平线上的萨沙","地平线":"地平线上的萨沙",
  "灭龙":"灭龙行动","萨沙":"萨沙取物","取物":"萨沙取物","自由":"自由间谍",
  "间谍":"自由间谍","重重":"重重一螫","聚集":"聚集力量","力量":"聚集力量",
  "巨型":"巨型驱动器","驱动器":"巨型驱动器","巨驱":"巨型驱动器","解放矿工a":"解放矿工A",
  "解放矿工A":"解放矿工A","解放矿工c":"解放矿工C","解放矿工C":"解放矿工C","解放矿工目标C":"解放矿工C",
  "解放矿工":"解放矿工A","解放A":"解放矿工A","解放a":"解放矿工A","矿工A":"解放矿工A",
  "矿工a":"解放矿工A","解放C":"解放矿工C","解放c":"解放矿工C","矿工C":"解放矿工C",
  "矿工c":"解放矿工C","解放":"解放矿工A","矿工":"解放矿工A","袭击护航队a":"袭击护航队A",
  "袭击护航队A":"袭击护航队A","袭击护航A":"袭击护航队A","袭击护航队c":"袭击护航队C",
  "袭击护航队C":"袭击护航队C","袭击护航队目标C":"袭击护航队C","袭击护航C":"袭击护航队C","袭击护航队":"袭击护航队A",
  "袭击护航":"袭击护航队A","护航队A":"袭击护航队A","护航队a":"袭击护航队A",
  "袭击A":"袭击护航队A","袭击a":"袭击护航队A","护航队C":"袭击护航队C",
  "护航队c":"袭击护航队C","袭击C":"袭击护航队C","袭击c":"袭击护航队C",
  "护航队":"袭击护航队A","袭击":"袭击护航队A","护航":"袭击护航队A",
  "地点":"地点地点","斩龙":"斩龙行动"
};
// 老板 UID → 备注名
const BOSS_NAME = {
  "9527":"名称占用"
};

/* ====================== 行解析工具 ====================== */
// 按关键字长度降序排序，长关键字优先匹配
// 否则 "袭击C" 会先命中 "袭击" 导致识别为袭击护航队A 而非 C
const KEY_MAP_SORTED = Object.entries(KEY_MAP).sort((a,b) => b[0].length - a[0].length);

const LOCS = ["埃格斯","乌法兰特","达斯顿斯","卡维因"];

// 从一行文本中提取任务名（模糊匹配，长关键字优先）
const getTask = line => {
  for(const [k,t] of KEY_MAP_SORTED){
    if(line.includes(k)) return t;
  }
  return "未识别";
};

// 提取地点名
const getLoc = line => LOCS.find(l => line.includes(l)) || "未知";

// 提取老板 UID，过滤过大的数字避免误判
const getUid = line => {
  const id = line.match(/-(\d+)/)?.[1] || line.match(/^(\d+)/)?.[1] || "未识别";
  return (id !== "未识别" && Number(id) > 1e9) ? "未识别" : id;
};

/* ====================== 价目表初始化 ====================== */
// 脚本在 body 末尾，DOM 已就绪，无需等待 window.onload
(() => {
  document.getElementById("priceGrid").innerHTML = Object.entries(TASK_PRICE).map(([n,p])=>
    `<div class="price-item ${p===0?"zero":""}" onclick="copyTaskName('${n}')">${n}<span class="p">${p}M</span></div>`
  ).join("");
})();

/* ====================== 「我的编号」读写（复制任务时带上） ====================== */
// 文本框填一次后用 localStorage 记住，刷新/下次打开仍生效；留空则只复制任务名
(() => {
  const input = document.getElementById("myId");
  input.value = localStorage.getItem("eveg5_myId") || "";
  input.addEventListener("input", () => {
    localStorage.setItem("eveg5_myId", input.value.trim());
  });
})();
function getMyId(){
  return (document.getElementById("myId").value || "").trim();
}

/* ====================== 右上角齿轮设置 / 说明面板 ====================== */
function toggleGear(){
  document.getElementById("helpPop").classList.remove("show"); // 互斥：打开齿轮先关说明
  document.getElementById("gearPop").classList.toggle("show");
}
function toggleHelp(){
  document.getElementById("gearPop").classList.remove("show"); // 互斥：打开说明先关齿轮
  document.getElementById("helpPop").classList.toggle("show");
}
// 点击按钮/面板以外区域时自动收起（两个面板统一处理）
document.addEventListener("click", e => {
  [["gearPop","gearBtn"],["helpPop","helpBtn"]].forEach(([popId,btnId]) => {
    const pop = document.getElementById(popId);
    const btn = document.getElementById(btnId);
    if(pop.classList.contains("show") && !pop.contains(e.target) && !btn.contains(e.target)){
      pop.classList.remove("show");
    }
  });
}, true);

/* ====================== 统计计算 ====================== */
function calc(){
  const text = document.getElementById("input").value.trim();
  if(!text){
    alert("请粘贴任务地点数据后再提交！");
    return;
  }

  const user = {};
  let totalAll = 0;
  const unrecognized = [];

  text.split("\n").map(i=>i.trim()).filter(Boolean).forEach(line=>{
    const uid = getUid(line);
    const task = getTask(line);
    const loc = getLoc(line);
    // detail 取第 4 段：依赖游戏「地点」文本以「*」分隔的固定格式，取不到则为「无」
    const detail = line.split("*")[3] || "无";

    // 老板或任务未识别：仅收集到提示，不计入统计
    if(task === "未识别" || uid === "未识别"){
      unrecognized.push(line);
      return;
    }

    const price = TASK_PRICE[task] || 0;
    if(!user[uid]) user[uid] = { total:0, list:[], name: BOSS_NAME[uid] || "" };
    user[uid].list.push({ task, loc, detail, price });
    user[uid].total += price;
    totalAll += price;
  });

  renderResult(user, totalAll, unrecognized);
}

/* ====================== 结果渲染 ====================== */
// 缓存每张卡片的数据，供点击卡片分享时使用
const cardDataStore = {};
function renderResult(userMap, allTotal, unrecognized){
  unrecognized = unrecognized || [];
  for(const k in cardDataStore) delete cardDataStore[k];
  let html = `<div class="result-title">统计结果</div>`;

  if(unrecognized.length){
    html += `
      <div class="unrec-card">
        <div class="unrec-title">注意：有 ${unrecognized.length} 行未识别（未识别老板或任务），已自动排除、不计入统计</div>
        <div class="unrec-list">${unrecognized.join("<br>")}</div>
        <div class="unrec-tip">可自行补充老板ID或规范任务名称写法</div>
      </div>`;
  }

  for(const uid in userMap){
    const { total, list, name } = userMap[uid];
    const taskCount = list.length;
    const uidSafe = uid.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_');
    // 缓存该卡片数据，供点击卡片时分享使用
    cardDataStore[uidSafe] = { name: name || uid, total, list, taskCount };

    html += `
      <div class="user-box" id="box-${uidSafe}" onclick="shareCard('${uidSafe}')">
        <div class="user-head">
          <div class="user-info">
            ${name ? `<span class="user-name">${name}</span>` : ""}
            <span class="user-id">#${uid}</span>
          </div>
        </div>
        <div class="task-list" id="list-${uidSafe}">
          ${list.map(item=>`
            <div class="task-row ${item.price === 0 ? "zero" : ""}">
              <span class="name">${item.task}</span>
              <span class="info">${item.loc}｜${item.detail}</span>
              <span class="price">${item.price}M</span>
            </div>
          `).join("")}
        </div>
        <div class="user-total">报酬：${total} M</div>
      </div>
    `;
  }

  html += `<div class="total-all" onclick="shareAll()">总收入：${allTotal} M</div>`;
  document.getElementById("result").innerHTML = html;
}

/* ====================== 截图分享 ====================== */
// 图片下载：剪贴板不可用时的回退方案（见 copyCanvas）
function saveCanvasPng(canvas, filename){
  const link = document.createElement("a");
  link.download = filename;
  link.href = canvas.toDataURL("image/png");
  link.click();
}

// 将 canvas 写入剪贴板（优先），失败则回退下载 PNG
function copyCanvas(canvas, filename, successMsg){
  canvas.toBlob(blob => {
    try {
      if(!navigator.clipboard?.write || typeof ClipboardItem === "undefined"){
        throw new Error("clipboard unsupported");
      }
      navigator.clipboard.write([new ClipboardItem({ "image/png": blob })])
        .then(() => showToast(successMsg))
        .catch(() => { saveCanvasPng(canvas, filename); showToast("剪贴板失败，已下载图片"); });
    } catch {
      saveCanvasPng(canvas, filename);
      showToast("剪贴板失败，已下载图片");
    }
  });
}

// 截图前临时清除 transform/box-shadow，避免 hover/active 态被固化进图
function capture(el){
  const targets = (el.classList.contains("user-box") || el.classList.contains("total-all"))
    ? [el]
    : el.querySelectorAll(".user-box, .total-all");
  const saved = [...targets].map(t => [t, t.style.transform, t.style.boxShadow, t.style.filter]);
  saved.forEach(([t]) => { t.style.transform = "none"; t.style.boxShadow = "none"; t.style.filter = "none"; });
  const restore = () => saved.forEach(([t, tr, tb, tf]) => { t.style.transform = tr; t.style.boxShadow = tb; t.style.filter = tf; });
  return html2canvas(el, {
    backgroundColor: "#ffffff",
    scale: 2,
    useCORS: true,
    logging: false
  }).then(canvas => { restore(); return canvas; })
    .catch(err => { restore(); throw err; });
}

// 总体截图分享：截取整个结算结果（含未识别提醒与各卡片、总收入）
function shareAll(){
  const result = document.getElementById("result");
  if(!result.innerHTML.trim()){
    showToast("请先点「开始统计」生成数据");
    return;
  }
  if(typeof html2canvas !== "function"){
    showToast("截图组件未加载，请刷新页面重试");
    return;
  }
  capture(result).then(canvas => copyCanvas(canvas, "五级任务结算单.png", "已复制全部结算单，可直接粘贴到QQ分享"))
    .catch(() => showToast("截图生成失败，请重试"));
}

function shareCard(uidSafe){
  const data = cardDataStore[uidSafe];
  const box = document.getElementById("box-" + uidSafe);
  if(!box || !data) return;

  // html2canvas 未加载（CDN 失败）时给出友好提示
  if(typeof html2canvas !== "function"){
    showToast("截图组件未加载，请刷新页面重试");
    return;
  }

  showToast("生成中...");
  capture(box).then(canvas => copyCanvas(canvas, `${data.name}_任务结算单.png`, "已复制到剪贴板，可直接粘贴到QQ分享"))
    .catch(() => showToast("截图生成失败，请重试"));
}

/* ====================== 文本复制 ====================== */
// 优先 Clipboard API，失败回退 execCommand
function copyText(text, successMsg){
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(text)
      .then(() => showToast(successMsg))
      .catch(() => fallbackCopyText(text, successMsg));
  } else {
    fallbackCopyText(text, successMsg);
  }
}

// 价目表点击复制任务名（自动带上「我的编号」）
function copyTaskName(name){
  const id = getMyId();
  // 复制格式：编号直接连任务名（如 "9527繁殖设施"）。想换格式改这一行即可，例如：
  //   `#${id}${name}`          编号带井号在前
  //   `${name}${id}`           任务名在前、编号在后
  //   `${name}（${id}）`       编号放括号
  const text = id ? `${id}${name}` : name;
  const msg = id ? `已复制「${name}」并带上编号 ${id}` : `已复制「${name}」`;
  copyText(text, msg);
}

function fallbackCopyText(text, successMsg){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand("copy");
    showToast(successMsg);
  } catch {
    showToast("复制失败，请手动复制");
  }
  document.body.removeChild(ta);
}

/* ====================== Toast 提示 ====================== */
// 防抖：重复触发时重置计时，避免提前消失
let toastTimer = null;
function showToast(message){
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 2000);
}

/* ====================== 清空 ====================== */
function clearAll(){
  document.getElementById("input").value = "";
  document.getElementById("result").innerHTML = "";
}
