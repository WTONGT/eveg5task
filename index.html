<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>任务价值统计</title>
<style>
/* 全局重置与变量 */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
:root {
  --blue: #3a86ff;
  --green: #38b000;
  --red: #ff5757;
  --gray: #6c757d;
  --light: #f8f9fa;
  --white: #ffffff;
  --radius: 12px;
}

/* 基础布局 */
body {
  font-family: "Microsoft YaHei", sans-serif;
  background: var(--light);
  color: #333;
  max-width: 680px;
  margin: 30px auto;
  padding: 0 16px;
  line-height: 1.4;
}
.title {
  text-align: center;
  margin-bottom: 20px;
  font-size: 22px;
  font-weight: 500;
}

/* 价目表 */
.price-panel {
  background: var(--white);
  border-radius: var(--radius);
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  overflow: hidden;
}
.panel-header {
  padding: 12px 16px;
  background: rgba(58, 134, 255, 0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  font-size: 15px;
}
.panel-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.panel-body.show {
  max-height: 500px;
}
.price-grid {
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.price-item {
  padding: 6px 10px;
  background: var(--light);
  border-radius: 6px;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
}
.price-item.zero {
  color: var(--red);
}
.price-item span {
  font-weight: bold;
}

/* 输入区域 */
textarea {
  width: 100%;
  height: 150px;
  padding: 12px;
  border-radius: var(--radius);
  border: 1px solid #ddd;
  font-size: 14px;
  resize: vertical;
  margin-bottom: 12px;
  outline: none;
}
textarea:focus {
  border-color: var(--blue);
}
.btn-group {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 16px;
}
button {
  padding: 8px 24px;
  border-radius: 8px;
  border: none;
  background: var(--blue);
  color: white;
  cursor: pointer;
  font-size: 14px;
}
button.gray {
  background: var(--gray);
}

/* 统计结果 - 极简风格 */
.result-box {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.result-title {
  text-align: center;
  margin-bottom: 14px;
  font-size: 17px;
}
.section {
  margin-bottom: 12px;
}
.section-head {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 6px;
}
.section-head.err {
  color: var(--red);
}
.item {
  display: flex;
  justify-content: space-between;
  padding: 6px 10px;
  background: var(--light);
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 4px;
}
.item.err {
  background: rgba(255,87,87,0.05);
}
.item .val {
  font-weight: bold;
  color: var(--green);
}
.item.err .val {
  color: var(--red);
}

/* 总计 */
.total {
  margin-top: 16px;
  padding: 12px;
  background: rgba(56, 176, 0, 0.05);
  border-radius: 8px;
  text-align: center;
  font-size: 14px;
}
.total .num {
  font-size: 18px;
  font-weight: bold;
  color: var(--green);
  margin-top: 4px;
}
</style>
</head>
<body>

<div class="title">📊 任务价值统计</div>

<!-- 价目表 -->
<div class="price-panel">
  <div class="panel-header" onclick="togglePanel()">
    <span>任务价目表</span>
    <span>▼</span>
  </div>
  <div class="panel-body" id="priceBody">
    <div class="price-grid" id="priceGrid"></div>
  </div>
</div>

<!-- 输入 -->
<textarea id="input" placeholder="在地点里选中所有完成的任务地点Ctrl+C，然后在这里Ctrl+V..模糊识别7+任务名称"></textarea>
<div class="btn-group">
  <button onclick="start()">统计</button>
  <button class="gray" onclick="clearAll()">清空</button>
</div>

<!-- 结果 -->
<div class="result-box" id="result"></div>

<script>
// 任务配置
const TASK = {
  "7繁殖设施":10,"7天使的愤怒":13,"7净化的火焰":13,"7开拓号":13,
  "7清理门户":15,"7地平线上的萨沙":15,"7灭龙行动":20,"7萨沙取物":20,
  "7自由间谍":23,"7重重一螫":30,"7聚集力量":30,"7地点地点":40,
  "7巨型驱动器":30,"7解放矿工A":30,"7解放矿工C":40,"7袭击护航队A":30,
  "7袭击护航队C":40,"7斩龙行动":0
};

// 切换价目表
function togglePanel() {
  const b = document.getElementById("priceBody");
  b.classList.toggle("show");
}

// 渲染价目表
function renderPrice() {
  let html = "";
  for (let k in TASK) {
    const name = k.replace(/^7/, "");
    const cls = TASK[k] === 0 ? "zero" : "";
    html += `<div class="price-item ${cls}">${name} <span>${TASK[k]}M</span></div>`;
  }
  document.getElementById("priceGrid").innerHTML = html;
}

// 数字动画
function animNum(el, to) {
  let cur = 0;
  const step = () => {
    cur += Math.ceil((to - cur) / 10);
    if (cur > to) cur = to;
    el.textContent = cur + "M";
    if (cur < to) requestAnimationFrame(step);
  };
  step();
}

// 开始统计
function start() {
  const text = document.getElementById("input").value.trim();
  if (!text) return alert("请输入数据");

  // 数据处理
  const lines = text.split("\n").map(i => i.trim()).filter(i => i);
  const map = {};

  lines.forEach(line => {
    if (/^[123]7/.test(line)) return;
    let match = null;
    for (let k in TASK) {
      if (line.includes(k)) { match = k; break; }
    }
    if (match) {
      if (!map[match]) map[match] = { c: 0, p: TASK[match] };
      map[match].c++;
    } else {
      if (!map["未知"]) map["未知"] = { c: 0, p: 0 };
      map["未知"].c++;
    }
  });

  // 分类
  const ok = [], no = [];
  let totalVal = 0, totalCnt = 0, okCnt = 0, noCnt = 0;

  for (let k in map) {
    const { c, p } = map[k];
    const v = c * p;
    totalCnt += c;
    const item = { n: k.replace(/^7/, ""), c, p, v };
    p > 0 ? (ok.push(item), totalVal += v, okCnt += c) : (no.push(item), noCnt += c);
  }

  // 渲染结果
  showResult(ok, no, totalVal, totalCnt, okCnt, noCnt);
}

// 展示结果
function showResult(ok, no, val, cnt, okc, noc) {
  let h = `<div class="result-title">统计结果</div>`;

  if (ok.length) {
    h += `<div class="section"><div class="section-head">✅ 有效任务</div>`;
    ok.forEach(i => {
      h += `<div class="item"><div>${i.n} (${i.c}×${i.p}M)</div><div class="val">${i.v}M</div></div>`;
    });
    h += `</div>`;
  }

  if (no.length) {
    h += `<div class="section"><div class="section-head err">❌ 无效任务</div>`;
    no.forEach(i => {
      h += `<div class="item err"><div>${i.n} (${i.c}×${i.p}M)</div><div class="val">${i.v}M</div></div>`;
    });
    h += `</div>`;
  }

  h += `
  <div class="total">
    <div>总计 ${cnt} 个 · 有效 ${okc} 个 · 无效 ${noc} 个</div>
    <div class="num" id="total">0</div>
  </div>`;

  document.getElementById("result").innerHTML = h;
  animNum(document.getElementById("total"), val);
  setTimeout(() => {
    document.getElementById("total").textContent = `💰 ${val}M`;
  }, 600);
}

// 清空
function clearAll() {
  document.getElementById("input").value = "";
  document.getElementById("result").innerHTML = "";
}

// 初始化
window.onload = renderPrice;
</script>
</body>
</html>
