<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>五级任务报酬统计</title>
<style>
:root {
  --primary: #3a86ff;
  --success: #38b000;
  --danger: #ff5757;
  --light: #f7f8fa;
  --white: #fff;
  --radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.04);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
}

body {
  background: var(--light);
  max-width: 700px;
  margin: 20px auto;
  padding: 0 12px;
  font-size: 14px;
  color: #2a2a2a;
}

.title {
  text-align: center;
  margin: 10px 0 16px;
  font-size: 18px;
  font-weight: 500;
}

/* 价目表 */
.price-card {
  background: var(--white);
  border-radius: var(--radius);
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.price-header {
  padding: 12px 14px;
  background: #f8f9fa;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
  font-weight: 500;
}
.price-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.price-body.show {
  max-height: 1000px;
}
.price-grid {
  padding: 10px 12px 12px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.price-item {
  padding: 6px 8px;
  background: var(--light);
  border-radius: 5px;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
}
.price-item.zero {
  color: var(--danger);
}

/* 输入框 */
textarea {
  width: 100%;
  height: 110px;
  padding: 12px 14px;
  border-radius: var(--radius);
  border: 1px solid #eee;
  font-size: 13px;
  resize: none;
  margin-bottom: 14px;
  outline: none;
  background: var(--white);
  box-shadow: var(--shadow);
}
textarea:focus {
  border-color: var(--primary);
}

/* 按钮 */
.btns {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 18px;
}
button {
  padding: 9px 20px;
  border-radius: 6px;
  border: none;
  background: var(--primary);
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  transition: opacity 0.2s;
}
button:hover{
  opacity: 0.9;
}
button.gray {
  background: #86909c;
}

/* 结果区域 */
.result-title {
  text-align: center;
  margin-bottom: 14px;
  font-size: 16px;
  font-weight: 500;
}

.user-box {
  background: var(--white);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.user-head {
  font-weight: 500;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.user-head.fold {
  cursor: pointer;
}
.toggle-text {
  font-size: 13px;
  color: var(--primary);
  font-weight: normal;
}

.task-list {
  overflow: hidden;
  transition: max-height 0.3s ease;
  max-height: 2000px;
}
.task-list.hide {
  max-height: 0 !important;
}

.task-row {
  font-size: 13px;
  padding: 7px 0;
  border-bottom: 1px dashed #f2f2f2;
  display: flex;
  align-items: center;
  gap: 8px;
}
.task-row .name { flex: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-row .info { flex: 3; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-row .price { flex: 0 0 50px; text-align: right; font-weight: bold; color: var(--success); }

.user-total {
  margin-top: 10px;
  font-weight: bold;
  color: var(--success);
  text-align: right;
}

.total-all {
  margin-top: 16px;
  padding: 12px;
  background: var(--success);
  color: #fff;
  text-align: center;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 500;
}
</style>
</head>

<body>
<div class="title">📊 五级任务报酬统计</div>

<div class="price-card">
  <div class="price-header" onclick="togglePrice()">
    <span>任务价目表</span>
    <span id="arr">▼</span>
  </div>
  <div class="price-body" id="priceBody">
    <div class="price-grid" id="priceGrid"></div>
  </div>
</div>

<textarea id="input" placeholder="在地点里选中所有完成的任务地点Ctrl+C，然后在这里Ctrl+V...可模糊识别数字+任务名称关键字"></textarea>
<div class="btns">
  <button onclick="calc()">提交统计</button>
  <button class="gray" onclick="clearAll()">清空内容</button>
</div>

<div id="result"></div>

<script>
// ======================任务识别配置
const TASK_PRICE = {
  "繁殖设施":15,"天使的愤怒":20,"净化的火焰":20,"开拓号":20,
  "清理门户":20,"地平线上的萨沙":20,"灭龙行动":20,"萨沙取物":20,
  "自由间谍":25,"重重一螫":25,"聚集力量":25,"巨型驱动器":25,
  "解放矿工A":25,"解放矿工C":25,"袭击护航队A":35,"袭击护航队C":40,
  "地点地点":25,"斩龙行动":0
};
const KEY_MAP = {
  "繁殖":"繁殖设施","设施":"繁殖设施","天使":"天使的愤怒","愤怒":"天使的愤怒",
  "净化":"净化的火焰","火焰":"净化的火焰","开拓":"开拓号","清理":"清理门户",
  "门户":"清理门户","地平":"地平线上的萨沙","地平线":"地平线上的萨沙",
  "灭龙":"灭龙行动","萨沙":"萨沙取物","取物":"萨沙取物","自由":"自由间谍",
  "间谍":"自由间谍","重重":"重重一螫","聚集":"聚集力量","力量":"聚集力量",
  "巨型":"巨型驱动器","驱动器":"巨型驱动器","解放矿工a":"解放矿工A",
  "解放矿工A":"解放矿工A","解放矿工c":"解放矿工C","解放矿工C":"解放矿工C","解放矿工目标C":"解放矿工C",
  "解放矿工":"解放矿工A","解放A":"解放矿工A","解放a":"解放矿工A","矿工A":"解放矿工A",
  "矿工a":"解放矿工A","解放C":"解放矿工C","解放c":"解放矿工C","矿工C":"解放矿工C",
  "矿工c":"解放矿工C","解放":"解放矿工A","矿工":"解放矿工A","袭击护航队a":"袭击护航队A",
  "袭击护航队A":"袭击护航队A","袭击护航A":"袭击护航队A","袭击护航队c":"袭击护航队C",
  "袭击护航队C":"袭击护航队C","袭击护航队目标C":"袭击护航队C","袭击护航C":"袭击护航队C","袭击护航队":"袭击护航队A",
  "袭击护航":"袭击护航队A","护航队A":"袭击护航队A","护航队a":"袭击护航队A",
  "袭击A":"袭击护航队A","袭击a":"袭击护航队A","护航队C":"袭击护航队C",
  "护航队c":"袭击护航队C","袭击C":"袭击护航队C","袭击c":"袭击护航队C",
  "护航队":"袭击护航队A","袭击":"袭击护航队A","护航":"袭击护航队A",
  "地点":"地点地点","斩龙":"斩龙行动"
};
const BOSS_NAME = {
  "1":"长文白","2":"拜登","3":"破风","4":"东东","5":"阴空",
  "6":"恶鬼","7":"9527","8":"佛狸","9":"千千岩","10":"星空双鱼",
  "11":"老京","12":"厕所","13":"不吸香烟","14":"猕猴桃","15":"飞狐",
  "16":"0845","17":"YANG KE","18":"天堂","19":"梦宇",
  "12345":"张三","11223":"王五","44556":"赵六"
};

// ====================== 工具函数
const getTask = line => { 
  for(const [k,t] of Object.entries(KEY_MAP)) {
    if(line.includes(k)) return t;
  }
  return "未识别";
};

const getLoc = line => { 
  if(line.includes("埃格斯"))return"埃格斯";
  if(line.includes("乌法兰特"))return"乌法兰特";
  if(line.includes("达斯顿斯"))return"达斯顿斯";
  if(line.includes("卡维因"))return"卡维因";
  return"未知";
};

const getUid = line => { 
  let id = line.match(/-(\d+)/)?.[1] || line.match(/^(\d+)/)?.[1] || "未识别";
  if(id!=="未识别" && Number(id)>100) return "未识别";
  return id;
};

// ====================== 初始化
window.onload = () => {
  const g = document.getElementById("priceGrid");
  g.innerHTML = Object.entries(TASK_PRICE).map(([n,p])=>
    `<div class="price-item ${p===0?"zero":""}">${n}<span>${p}M</span></div>`
  ).join("");
  togglePrice(); // 默认展开价目表
};

// 价目表展开/收起
function togglePrice(){
  const b = document.getElementById("priceBody");
  b.classList.toggle("show");
  document.getElementById("arr").textContent = b.classList.contains("show")?"▲":"▼";
}

// 任务列表折叠
function toggle(id){
  const list = document.getElementById("list-"+id);
  const text = document.getElementById("txt-"+id);
  list.classList.toggle("hide");
  text.textContent = list.classList.contains("hide")?"展开":"收起";
}

// 计算统计
function calc(){
  const text = document.getElementById("input").value.trim();
  if(!text) {
    alert("请粘贴任务地点数据后再提交！");
    return;
  }

  const user = {};
  let totalAll = 0;

  text.split("\n").map(i=>i.trim()).filter(Boolean).forEach(line=>{
    const uid = getUid(line);
    const task = getTask(line);
    const loc = getLoc(line);
    const detail = line.split("*")[3] || "无";
    const price = TASK_PRICE[task] || 0;

    if(!user[uid]) {
      user[uid] = { total:0, list:[] };
    }
    
    user[uid].list.push({ task, loc, detail, price });
    user[uid].total += price;
    totalAll += price;
  });

  renderResult(user, totalAll);
}

// 渲染结果
function renderResult(userMap, allTotal){
  let html = `<div class="result-title">💰 统计结果</div>`;

  for(const uid in userMap){
    const { total, list } = userMap[uid];
    const name = uid === "未识别" ? "未识别用户" : BOSS_NAME[uid] || `ID:${uid}`;
    const taskCount = list.length;
    const needFold = taskCount > 20;

    html += `
      <div class="user-box">
        <div class="user-head ${needFold?"fold":""}" ${needFold?`onclick="toggle('${uid}')"`:""}>
          👨‍💼 ${name}｜${taskCount}个任务
          ${needFold?`<span class="toggle-text" id="txt-${uid}">展开</span>`:""}
        </div>
        <div class="task-list ${needFold?"hide":""}" id="list-${uid}">
          ${list.map(item=>`
            <div class="task-row">
              <span class="name">${item.task}</span>
              <span class="info">${item.loc}｜${item.detail}</span>
              <span class="price">${item.price}M</span>
            </div>
          `).join("")}
        </div>
        <div class="user-total">报酬：${total} M</div>
      </div>
    `;
  }

  html += `<div class="total-all">📊 总收入：${allTotal} M</div>`;
  document.getElementById("result").innerHTML = html;
}

// 清空
function clearAll(){
  document.getElementById("input").value = "";
  document.getElementById("result").innerHTML = "";
}
</script>
</body>
</html>
