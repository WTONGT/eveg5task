<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>星区任务价值统计</title>
<style>
*{box-sizing:border-box}
body{font-family:Arial;background:#121212;color:#fff;padding:20px}
.container{max-width:1000px;margin:auto}
textarea{width:100%;height:240px;padding:10px;background:#222;color:#fff;border:1px solid #555}
button{padding:10px 20px;margin:10px 5px;background:#007bff;color:#fff;border:none;border-radius:5px;cursor:pointer}
.stats{background:#1a1a1a;padding:15px;border-radius:8px;margin:20px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:10px}
.item{background:#2a2a2a;padding:10px;border-left:4px solid #007bff}
.total{font-size:18px;font-weight:bold;color:#00ff7f;margin-top:15px;padding:10px;background:#00ff7f1a;border-radius:5px}
</style>
</head>
<body>
<div class="container">
    <h2>🌌 星区任务价值统计（GitHub Pages 版）</h2>
    <textarea id="data" placeholder="粘贴你的任务数据："></textarea>
    <br>
    <button onclick="run()">开始统计</button>
    <button onclick="clearAll()">清空</button>

    <div class="stats" id="result"></div>
</div>

<script>
// 任务价值配置
const taskPrices = {
    "7重重一螫": 100,
    "7解放矿工C": 120,
    "7解放矿工A": 110,
    "7袭击护航队C": 90,
    "7聚集力量": 130,
    "7繁殖设施": 150,
    "7清理门户": 140,
    "7巨型驱动器": 160
}

function run() {
    const text = document.getElementById("data").value
    const lines = text.split("\n").map(i => i.trim()).filter(i => i && !i.includes("没有物品"))

    const count = {}
    let totalCount = 0
    let totalValue = 0

    for (let line of lines) {
        const name = line.split(/\s+/)[0]
        if (!name) continue
        count[name] = (count[name] || 0) + 1
    }

    let html = "<h3>📊 统计结果</h3><div class='grid'>"
    for (let task in count) {
        const num = count[task]
        const val = (taskPrices[task] || 0) * num
        html += `<div class='item'><b>${task}</b><br>数量：${num} | 价值：${val}</div>`
        totalCount += num
        totalValue += val
    }
    html += "</div>"
    html += `<div class='total'>✅ 总计：任务 ${totalCount} 个 | 总价值 ${totalValue}</div>`
    document.getElementById("result").innerHTML = html
}

function clearAll() {
    document.getElementById("data").value = ""
    document.getElementById("result").innerHTML = ""
}
</script>
</body>
</html>
